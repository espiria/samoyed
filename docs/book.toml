[book]
title = "Samoyed Documentation"
authors = ["Samoyed Contributors"]
description = "Documentation for Samoyed, a minimal, cross-platform Git hooks manager"
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/nutthead/samoyed"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/nutthead/samoyed/edit/main/docs/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true
